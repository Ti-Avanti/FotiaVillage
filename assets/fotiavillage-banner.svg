<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FotiaVillage banner</title>
  <desc id="desc">A banner for the FotiaVillage Paper plugin, showing villager control, lifespan, trade limits, statistics, GUI and PlaceholderAPI features.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17324A"/>
      <stop offset="0.52" stop-color="#29513A"/>
      <stop offset="1" stop-color="#6D7A3A"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F6F0D6"/>
      <stop offset="1" stop-color="#DCC987"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#07130E" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#sky)"/>
  <path d="M0 264C91 235 158 231 250 255C342 279 414 280 520 246C648 205 736 224 820 250C924 282 1037 281 1200 226V360H0V264Z" fill="#1D3B28"/>
  <path d="M0 305C112 282 198 288 287 310C399 338 493 322 581 299C680 273 787 278 892 306C1010 338 1101 319 1200 292V360H0V305Z" fill="#10271D"/>

  <g transform="translate(88 66)" filter="url(#shadow)">
    <rect x="0" y="0" width="258" height="208" rx="18" fill="url(#panel)" stroke="#3A2D19" stroke-width="6"/>
    <rect x="42" y="51" width="174" height="44" rx="6" fill="#5B3A21"/>
    <rect x="58" y="66" width="34" height="18" rx="4" fill="#121A17"/>
    <rect x="166" y="66" width="34" height="18" rx="4" fill="#121A17"/>
    <path d="M107 110H151L140 136H118L107 110Z" fill="#8D5D33"/>
    <rect x="72" y="154" width="114" height="18" rx="9" fill="#2F6D42"/>
    <rect x="96" y="176" width="66" height="16" rx="8" fill="#274E35"/>
  </g>

  <g transform="translate(405 76)">
    <text x="0" y="52" fill="#FFF7DB" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="800">FotiaVillage</text>
    <text x="2" y="94" fill="#D9F2C9" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Paper villager control, lifespan, trade limits and statistics</text>
    <g transform="translate(0 132)" fill="#F8F4E4" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
      <rect x="0" y="0" width="146" height="42" rx="8" fill="#B84D37"/>
      <text x="20" y="28">Lifespan</text>
      <rect x="164" y="0" width="158" height="42" rx="8" fill="#2F8B57"/>
      <text x="188" y="28">Trade Rules</text>
      <rect x="340" y="0" width="118" height="42" rx="8" fill="#3D6EA8"/>
      <text x="364" y="28">Stats</text>
      <rect x="476" y="0" width="112" height="42" rx="8" fill="#8A6338"/>
      <text x="501" y="28">GUI</text>
      <rect x="606" y="0" width="202" height="42" rx="8" fill="#6F4C9B"/>
      <text x="630" y="28">PlaceholderAPI</text>
    </g>
  </g>

  <g transform="translate(892 96)" filter="url(#shadow)">
    <rect x="0" y="0" width="210" height="172" rx="14" fill="#F4EED7" stroke="#2B2418" stroke-width="5"/>
    <rect x="26" y="28" width="158" height="18" rx="4" fill="#2F8B57"/>
    <rect x="26" y="61" width="112" height="14" rx="4" fill="#8A6338"/>
    <rect x="26" y="90" width="146" height="14" rx="4" fill="#3D6EA8"/>
    <rect x="26" y="119" width="92" height="14" rx="4" fill="#B84D37"/>
    <circle cx="166" cy="124" r="18" fill="#D8A23A"/>
    <path d="M158 124L164 130L176 116" stroke="#2B2418" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
