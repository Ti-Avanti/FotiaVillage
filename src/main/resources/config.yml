# FotiaVillage 配置文件

# 语言设置：zh_CN 或 en_US
language: zh_CN

# 调试模式：启用后输出详细日志
debug: false

# GUI 设置
gui:
  # 是否启用统计和排行榜 GUI
  enabled: true

# PlaceholderAPI 设置
placeholder:
  # 是否注册 FotiaVillage 变量
  enabled: true

# 更新检测
update-checker:
  # 是否在启动/重载时检测 GitHub Release 新版本
  enabled: true

# 性能监控设置
performance:
  # 是否启用自动性能报告
  auto-report: true
  # 自动报告间隔（秒）
  report-interval: 300
  # TPS 低于该值时输出警告
  low-tps-warning: 18.0
  # 清理过期数据库记录的间隔（秒）
  cleanup-expired-interval: 600

# 兼容设置
compatibility:
  shopkeepers:
    # 是否让 Shopkeepers 商店村民跳过寿命系统
    exclude-lifespan: true
  citizens:
    # 是否让 Citizens NPC（即使外观/实体类型是村民）跳过寿命系统
    exclude-lifespan: true
  generic-npc-metadata:
    # 是否按通用 metadata 标记排除 NPC，兼容会给实体写入 NPC metadata 的插件
    exclude-lifespan: true
    # 通用 NPC metadata 名称，常见值为 NPC
    key: NPC

# 村民数量限制设置
villager-limit:
  # 是否启用区域村民数量限制
  enabled: true
  # 检测范围（区块半径）
  chunk-radius: 3
  # 范围内最大村民数量
  max-villagers: 5

# 村民生成控制
spawn-control:
  # 是否启用村民生成控制（关闭后不拦截自然生成、治愈、刷怪蛋和繁殖）
  enabled: true
  # 是否禁止自然生成
  block-natural-spawn: true
  # 是否允许治愈僵尸村民
  allow-cure: true
  # 是否允许使用村民刷怪蛋
  allow-spawn-egg: true
  # 是否允许村民繁殖
  allow-breeding: true

# 村民寿命设置
villager-lifespan:
  # 是否启用寿命系统
  enabled: true
  # 新增/补全寿命的天数
  days: 7
  # 是否通知玩家
  notify-enabled: true
  # 通知范围（格，0 表示全服）
  notify-range: 16
  # /fv lifespan addtarget 命令可选中村民的最大距离（格）
  command-target-range: 6.0
  # 寿命到期后是否变成僵尸村民
  # false：按原逻辑直接移除；true：在原位置生成僵尸村民并移除原村民
  zombify-on-expire: false
  # 自动为没有寿命的村民补全寿命
  auto-add-lifespan:
    # 是否启用自动补全
    enabled: true
    # 检查间隔（秒，0 表示仅启动时检查）
    check-interval: 300
    # 启动后是否执行一次检查
    check-on-startup: true

# 交易控制
trade-control:
  # 是否启用交易控制（关闭后不执行禁用交易、经验消耗、成本递增、冷却、次数限制和额外绿宝石消耗；交易统计仍按 statistics 配置生效）
  enabled: true
  # 是否完全禁用村民交易
  disable-trading: false

  # 交易经验消耗
  exp-cost:
    enabled: true
    # 消耗模式：LEVEL 等级，POINTS 经验点
    cost-mode: LEVEL
    # 基础消耗
    base-cost: 5
    # 按职业设置消耗
    per-profession:
      LIBRARIAN: 10
      WEAPONSMITH: 15
      ARMORER: 15
      TOOLSMITH: 12
      CLERIC: 8
      FARMER: 3
      FISHERMAN: 3
      FLETCHER: 5
      LEATHERWORKER: 5
      SHEPHERD: 3
      BUTCHER: 3
      CARTOGRAPHER: 10
      MASON: 5
    # 高价值物品额外经验消耗
    valuable-items:
      DIAMOND: 20
      DIAMOND_SWORD: 25
      DIAMOND_PICKAXE: 25
      DIAMOND_AXE: 25
      DIAMOND_SHOVEL: 20
      DIAMOND_HOE: 20
      DIAMOND_HELMET: 20
      DIAMOND_CHESTPLATE: 25
      DIAMOND_LEGGINGS: 23
      DIAMOND_BOOTS: 20
      ENCHANTED_BOOK: 15
      NETHERITE_INGOT: 30
      ELYTRA: 50
    # 最低保留等级
    min-level: 0

  # 交易成本递增
  cost-scaling:
    enabled: true
    # 递增类型：MULTIPLIER 倍率，ADDITIVE 固定增量，STEPPED 阶梯
    scaling-type: MULTIPLIER
    # MULTIPLIER 模式每次交易乘以该值
    multiplier: 1.5
    # 最大倍率
    max-multiplier: 10.0
    # ADDITIVE 模式每次增加的倍率数值
    additive-amount: 1
    # 重置时间（小时，0 表示不重置）
    reset-hours: 24
    # 每小时衰减比例，0 表示不衰减
    decay-rate: 0.0

  # 交易冷却
  cooldown:
    enabled: true
    # 默认冷却（秒）
    default-cooldown: 300
    # 按职业覆盖默认冷却，填 0 表示该职业不加冷却
    per-profession:
      LIBRARIAN: 600
      WEAPONSMITH: 900
      ARMORER: 900
      TOOLSMITH: 720
      CLERIC: 480
      CARTOGRAPHER: 600
    # 按交易结果物品覆盖职业/默认冷却，填 0 表示该物品不加冷却
    per-item:
      DIAMOND: 1800
      ENCHANTED_BOOK: 1200
      NETHERITE_INGOT: 2400

  # 交易次数限制
  limit:
    enabled: true
    # 重置周期：DAILY 每日，WEEKLY 每周，MONTHLY 每月
    reset-period: DAILY
    # 全局周期交易次数上限
    global-limit: 50
    # 按职业限制
    per-profession:
      LIBRARIAN: 20
      WEAPONSMITH: 10
      ARMORER: 10
      TOOLSMITH: 15
      CLERIC: 15
      CARTOGRAPHER: 10
    # 按交易结果物品限制
    per-item:
      DIAMOND: 5
      ENCHANTED_BOOK: 10
      NETHERITE_INGOT: 3

  # 权限组差异化配置，按 priority 从高到低匹配
  permission-groups:
    # 是否启用权限组差异化（关闭后全部玩家使用 default 组倍率和加成）
    enabled: true
    admin:
      permission: "fotiavillage.trade.admin"
      priority: 100
      exp-cost-multiplier: 0.0
      cooldown-multiplier: 0.0
      daily-limit-bonus: 999999
    svip:
      permission: "fotiavillage.trade.svip"
      priority: 50
      exp-cost-multiplier: 0.5
      cooldown-multiplier: 0.5
      daily-limit-bonus: 50
    vip:
      permission: "fotiavillage.trade.vip"
      priority: 30
      exp-cost-multiplier: 0.8
      cooldown-multiplier: 0.7
      daily-limit-bonus: 20
    default:
      permission: ""
      priority: 0
      exp-cost-multiplier: 1.0
      cooldown-multiplier: 1.0
      daily-limit-bonus: 0

  # 额外绿宝石消耗
  economy-balance:
    enabled: true
    # 高价值物品绿宝石消耗倍率
    emerald-cost-multiplier: 1.5
    # 是否要求额外绿宝石
    require-extra-emeralds: true
    # 高价值物品额外绿宝石基础消耗
    valuable-items-emerald-cost:
      DIAMOND: 5
      DIAMOND_SWORD: 10
      DIAMOND_PICKAXE: 10
      ENCHANTED_BOOK: 8
      NETHERITE_INGOT: 20

  # 交易统计
  statistics:
    enabled: true
    # 是否输出详细交易日志
    detailed-logging: true
    # 排行榜显示数量
    leaderboard-size: 10

  # 普通村民交易界面信息显示
  # 只显示在普通村民交易结果物品说明上，不会显示到 Shopkeepers 商店 GUI。
  gui-display:
    enabled: true
    # 显示本次交易需要消耗的经验
    show-exp-cost: true
    # 显示当前经验消耗倍率
    show-exp-multiplier: true
    # 显示交易冷却状态
    show-cooldown: true
    # 显示全局、职业、物品交易次数限制
    show-limits: true
    # 显示额外绿宝石消耗
    show-extra-emeralds: true

# 命令设置
commands:
  # 是否启用 /fv kill
  kill-enabled: true
