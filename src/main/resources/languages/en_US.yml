prefix: "<!i><gold>[FotiaVillage]</gold> "
no-permission: "<!i><red>You do not have permission to use this command.</red>"
player-only: "<!i><red>This command can only be used by players.</red>"
player-not-found: "<!i><red>Player is not online or has no record.</red>"
reload-start: "<!i><yellow>Reloading configuration...</yellow>"
reload-success: "<!i><green>Configuration reloaded.</green>"
reload-failed: "<!i><red>Reload failed: {error}</red>"
unknown-command: "<!i><red>Unknown subcommand: {command}</red>"

status:
  connected: "connected"
  disconnected: "disconnected"

update:
  no-release: "No GitHub release was found. Release page: {url}"
  latest: "You are running the latest version: {version}"
  available-console: "New version available: current {current}, latest {latest}, download: {url}"
  available-player: "<!i><yellow>New FotiaVillage version available:</yellow> <red>{latest}</red><gray> (current {current})</gray> <aqua>{url}</aqua>"
  check-failed: "Update check failed: {error}"

time:
  duration-days-hours: "{days}d {hours}h"
  duration-hours-minutes: "{hours}h {minutes}m"
  duration-minutes-seconds: "{minutes}m {seconds}s"
  duration-seconds: "{seconds}s"
  ago-days: "{days}d ago"
  ago-hours: "{hours}h ago"
  ago-minutes: "{minutes}m ago"
  ago-seconds: "{seconds}s ago"

help:
  title: "<!i><gold>========== <yellow>FotiaVillage Commands</yellow> ==========</gold>"
  reload: "<!i><yellow>/fv reload</yellow> <gray>- Reload config and language</gray>"
  stats: "<!i><yellow>/fv stats [player]</yellow> <gray>- View trade stats</gray>"
  top: "<!i><yellow>/fv top</yellow> <gray>- View trade leaderboard</gray>"
  admin: "<!i><yellow>/fv admin reset|clear|info</yellow> <gray>- Manage trade data</gray>"
  perf: "<!i><yellow>/fv perf [memory|database|tracker|cleanup]</yellow> <gray>- View performance info</gray>"
  lifespan: "<!i><yellow>/fv lifespan check|add|addtarget|list</yellow> <gray>- Manage villager lifespan</gray>"
  item: "<!i><yellow>/fv item give <player> <item-id> [amount]</yellow> <gray>- Give lifespan items</gray>"
  kill: "<!i><yellow>/fv kill</yellow> <gray>- Remove all loaded villagers</gray>"

villager:
  limit-reached: "<!i><red>The villager limit for this area has been reached.</red>"
  spawn-blocked: "<!i><red>Natural villager spawning is disabled.</red>"
  cure-blocked: "<!i><red>Zombie villager curing is disabled.</red>"
  spawn-egg-blocked: "<!i><red>Villager spawn eggs are disabled.</red>"
  breeding-blocked: "<!i><red>Villager breeding is disabled.</red>"

lifespan:
  set: "<!i><green>Villager lifespan set to <yellow>{days}</yellow> days.</green>"
  expired: "<!i><red>A villager has expired and disappeared.</red>"
  display-days: "<!i><yellow>{days}d {hours}h left</yellow>"
  display-hours: "<!i><yellow>{hours}h left</yellow>"
  display-minutes: "<!i><yellow>{minutes}m left</yellow>"
  display-seconds: "<!i><red>{seconds}s left</red>"
  title: "<!i><gold>========== <yellow>Villager Lifespan</yellow> ==========</gold>"
  check: "<!i><yellow>Total:</yellow><white>{total}</white> <yellow>With lifespan:</yellow><green>{with}</green> <yellow>Without:</yellow><red>{without}</red>"
  add-success: "<!i><green>Added <yellow>{days}</yellow> days to <yellow>{count}</yellow> villagers.</green>"
  addtarget-usage: "<!i><red>Usage: /fv lifespan addtarget <days>. Look at the target villager while running it.</red>"
  invalid-days: "<!i><red>Days must be an integer greater than 0.</red>"
  target-not-found: "<!i><red>Look at a target villager within the configured range.</red>"
  target-success: "<!i><green>Added <yellow>{days}</yellow> days to the target villager. Remaining: <yellow>{time}</yellow>.</green>"
  target-excluded: "<!i><red>This villager is excluded by compatibility rules and cannot receive lifespan.</red>"
  list-empty: "<!i><green>All villagers have lifespan data.</green>"
  list-line: "<!i><yellow>{id}</yellow> <gray>@</gray> <white>{world}</white> <gray>({x}, {y}, {z})</gray>"
  disabled: "<!i><red>The lifespan system is disabled.</red>"
  item-success: "<!i><green>Used <yellow>{item}</yellow> to add <yellow>{days}</yellow> days to this villager. Remaining: <yellow>{time}</yellow>.</green>"
  item-no-permission: "<!i><red>You do not have permission to use this lifespan item.</red>"
  item-wrong-target: "<!i><red>This lifespan item cannot be used on that villager.</red>"
  item-excluded: "<!i><red>This villager is excluded by compatibility rules and cannot receive lifespan.</red>"

item:
  give-usage: "<!i><red>Usage: /fv item give <player> <item-id> [amount]</red>"
  unknown: "<!i><red>Unknown lifespan item config: {item}</red>"
  invalid-amount: "<!i><red>Amount must be an integer greater than 0.</red>"
  give-success: "<!i><green>Gave <yellow>{amount}</yellow> lifespan item(s) <yellow>{item}</yellow> to <yellow>{player}</yellow>.</green>"

trade:
  disabled: "<!i><red>Villager trading is disabled.</red>"
  cooldown: "<!i><red>This trade is cooling down. Remaining: </red><yellow>{time}</yellow>"
  limit-reached: "<!i><red>Your trade limit for this period has been reached.</red>"
  insufficient-exp: "<!i><red>This trade requires {required} levels. You have {current}.</red>"
  insufficient-points: "<!i><red>This trade requires {required} experience points. You have {current}.</red>"
  insufficient-emerald: "<!i><red>This trade requires {required} extra emeralds.</red>"
  min-level: "<!i><red>This trade would put you below the minimum retained level.</red>"
  exp-consumed-level: "<!i><yellow>Consumed <red>{amount}</red> levels.</yellow>"
  exp-consumed-points: "<!i><yellow>Consumed <red>{amount}</red> experience points.</yellow>"
  scaling: "<!i><yellow>Current trade cost multiplier: </yellow><red>{multiplier}</red>"
  database-error: "<!i><red>Failed to save trade data. This trade has been cancelled.</red>"

trade-gui:
  header: "<!i><dark_gray>--- FotiaVillage Trade Limits ---</dark_gray>"
  disabled: "<!i><red>Trade control is disabled</red>"
  trading-disabled: "<!i><red>Villager trading is disabled</red>"
  exp-cost-levels: "<!i><gray>Experience cost:</gray> <yellow>{amount} levels</yellow>"
  exp-cost-points: "<!i><gray>Experience cost:</gray> <yellow>{amount} points</yellow>"
  exp-multiplier: "<!i><gray>Experience multiplier:</gray> <yellow>x{multiplier}</yellow> <dark_gray>(scaling x{scaling} / group x{group})</dark_gray>"
  cooldown-remaining: "<!i><gray>Cooldown remaining:</gray> <red>{time}</red>"
  cooldown-next: "<!i><gray>Cooldown after trade:</gray> <yellow>{time}</yellow>"
  limit-global: "<!i><gray>Global trades:</gray> <yellow>{used}/{limit}</yellow>"
  limit-profession: "<!i><gray>Profession trades:</gray> <yellow>{used}/{limit}</yellow>"
  limit-item: "<!i><gray>Item trades:</gray> <yellow>{used}/{limit}</yellow>"
  extra-emeralds: "<!i><gray>Extra emeralds:</gray> <yellow>{amount}</yellow>"

stats:
  no-data: "<!i><yellow>Player <gold>{player}</gold> has no trade records.</yellow>"
  text-title: "<!i><gold>========== <yellow>Trade Stats</yellow> ==========</gold>"
  player: "<!i><yellow>Player:</yellow> <gold>{player}</gold>"
  total-trades: "<!i><yellow>Total trades:</yellow> <gold>{trades}</gold>"
  total-exp: "<!i><yellow>Total experience spent:</yellow> <gold>{exp}</gold>"
  item-line: "<!i><gray>-</gray> <gold>{item}</gold> <gray>x</gray> <gold>{count}</gold>"

leaderboard:
  no-data: "<!i><yellow>No leaderboard data.</yellow>"
  text-title: "<!i><gold>========== <yellow>Trade Leaderboard</yellow> ==========</gold>"
  line: "<!i><yellow>#{rank}</yellow> <gold>{player}</gold> <gray>-</gray> <white>{trades}</white> trades"

admin:
  reset-usage: '<!i><red>Usage: /fv admin reset \<player\></red>'
  reset-success: "<!i><green>Reset trade data for <yellow>{player}</yellow>.</green>"
  clear-warning: "<!i><red>Warning: this will clear all trade data. Run /fv admin clear confirm within 10 seconds to confirm.</red>"
  clear-success: "<!i><green>All trade data cleared.</green>"
  info: "<!i><yellow>Version:</yellow><white>{version}</white> <yellow>Database:</yellow><white>{database}</white>"

perf:
  title: "<!i><gold>========== <yellow>Performance</yellow> ==========</gold>"
  overview: "<!i><yellow>TPS:</yellow><white>{tps}</white> <yellow>Memory:</yellow><white>{used}MB/{max}MB</white> <yellow>Uptime:</yellow><white>{uptime}</white>"
  database: "<!i><yellow>Database:</yellow><white>{status}</white> <yellow>Size:</yellow><white>{size}</white>"
  tracker: "<!i><yellow>Tracked chunks:</yellow><white>{chunks}</white> <yellow>Villagers:</yellow><white>{villagers}</white>"
  cleanup-start: "<!i><yellow>Cleaning expired data...</yellow>"
  cleanup-done: "<!i><green>Cleanup complete.</green>"

kill:
  disabled: "<!i><red>/fv kill is disabled in config.</red>"
  success: "<!i><green>Removed <yellow>{count}</yellow> villagers.</green>"

gui:
  close: "<!i><red>Close</red>"
  stats-title: "Trade Stats - {player}"
  top-title: "Trade Leaderboard"
  page: "<!i><gray>Page {page}/{pages}</gray>"
  previous-page: "<!i><yellow>Previous Page</yellow>"
  next-page: "<!i><yellow>Next Page</yellow>"
  total-trades: "<!i><green>Total Trades</green>"
  total-exp: "<!i><aqua>Total Experience Spent</aqua>"
  last-trade: "<!i><yellow>Last Trade</yellow>"
  never: "Never"
  top-empty: "<!i><red>No leaderboard data</red>"
