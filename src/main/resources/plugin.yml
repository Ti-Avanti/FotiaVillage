name: FotiaVillage
version: '${project.version}'
main: gg.fotia.fotiavillage.FotiaVillagePlugin
api-version: '1.21'
author: Ti_Avanti
description: 村民数量、寿命、交易限制、统计与管理插件
softdepend:
  - PlaceholderAPI
commands:
  fv:
    description: FotiaVillage 主命令
    usage: /fv <reload|stats|top|admin|perf|lifespan|kill>
    aliases:
      - fotiavillage
permissions:
  fotiavillage.*:
    description: 允许使用 FotiaVillage 的全部功能
    default: op
    children:
      fotiavillage.admin: true
      fotiavillage.kill: true
      fotiavillage.stats: true
      fotiavillage.stats.others: true
      fotiavillage.top: true
      fotiavillage.trade.vip: true
      fotiavillage.trade.svip: true
      fotiavillage.trade.admin: true
  fotiavillage.admin:
    description: 允许使用管理命令
    default: op
  fotiavillage.kill:
    description: 允许清理已加载村民
    default: op
  fotiavillage.stats:
    description: 允许查看自己的交易统计
    default: true
  fotiavillage.stats.others:
    description: 允许查看其他玩家交易统计
    default: op
  fotiavillage.top:
    description: 允许查看交易排行榜
    default: true
  fotiavillage.trade.vip:
    description: VIP 交易权限组
    default: false
  fotiavillage.trade.svip:
    description: SVIP 交易权限组
    default: false
  fotiavillage.trade.admin:
    description: 管理员交易权限组
    default: op
